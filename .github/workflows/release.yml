name: Release

# Manually triggered to create a new beta or stable release.
# Bumps the version, builds a signed APK, commits+tags, and creates a GitHub Release.
#
# Required GitHub Secrets:
#   KEYSTORE_BASE64     – base64-encoded release keystore  (base64 -w0 release.keystore)
#   KEYSTORE_PASSWORD   – keystore password
#   KEY_ALIAS           – key alias inside the keystore
#   KEY_PASSWORD        – key password
#   ACTIONS_PAT         – Personal Access Token with `contents: write` (for protected main)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        default: fix
        options:
          - fix      # beta.N → beta.N+1
          - minor    # 1.X.0-beta.N → 1.(X+1).0-beta.1
          - major    # X.0.0-beta.N → (X+1).0.0-beta.1
      custom_version:
        description: 'Custom version (e.g. 1.0.0) — overrides bump if set'
        required: false
        default: ''

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ------------------------------------------------------------------
      # Version bump
      # ------------------------------------------------------------------
      - name: Bump version
        id: version
        run: |
          BUMP="${{ inputs.custom_version != '' && inputs.custom_version || inputs.bump }}"
          node .github/scripts/bump-version.cjs "$BUMP"

      # ------------------------------------------------------------------
      # Build signed release APK
      # ------------------------------------------------------------------
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          echo "KEYSTORE_PATH=$(pwd)/android/app/release.keystore" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"  >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                  >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"            >> "$GITHUB_ENV"

      - name: Convert keystore to JKS (BouncyCastle compatibility)
        run: |
          keytool -importkeystore \
            -srckeystore android/app/release.keystore \
            -destkeystore /tmp/release.jks \
            -deststoretype JKS \
            -srcstorepass:env KEYSTORE_PASSWORD \
            -deststorepass:env KEYSTORE_PASSWORD \
            -srcalias "$KEY_ALIAS" \
            -destalias "$KEY_ALIAS" \
            -srckeypass:env KEY_PASSWORD \
            -destkeypass:env KEY_PASSWORD \
            -noprompt
          mv /tmp/release.jks android/app/release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH:     ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ env.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ env.KEY_PASSWORD }}

      - name: Remove keystore from workspace
        if: always()
        run: rm -f android/app/release.keystore

      # ------------------------------------------------------------------
      # Commit, tag, push
      # ------------------------------------------------------------------
      - name: Commit & tag
        id: tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json app.json android/app/build.gradle \
                  fdroid/metadata/io.github.gametrojaner.geburtstage.yml
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push
          git push --tags
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # GitHub Release
      # ------------------------------------------------------------------
      - name: Rename APK
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          cp android/app/build/outputs/apk/release/app-release.apk \
             "Geburtstage-${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
          generate_release_notes: true
          files: Geburtstage-${{ steps.tag.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
