name: Release

# Fires automatically on every PR merge into main (fix bump by default).
# Put [minor] or [major] alone on its own line in the PR body to bump those levels instead.
#
# Can also be triggered manually (workflow_dispatch) to choose the bump type
# explicitly — use this for intentional minor/major milestone releases.
#
# Required GitHub Secrets:
#   KEYSTORE_BASE64     – base64-encoded release keystore  (base64 -w0 release.keystore)
#   KEYSTORE_PASSWORD   – keystore password
#   KEY_ALIAS           – key alias inside the keystore
#   KEY_PASSWORD        – key password
#   APP_ID              – GitHub App ID (geburtstage-release-bot)
#   APP_PRIVATE_KEY     – GitHub App private key (PEM)
#
# The GitHub App must also be added to the main branch Ruleset bypass list:
#   Repo → Settings → Rules → Rulesets → main → Bypass list → Add → GitHub Apps

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        default: fix
        options:
          - fix      # beta.N → beta.N+1
          - minor    # 1.X.0-beta.N → 1.(X+1).0-beta.1
          - major    # X.0.0-beta.N → (X+1).0.0-beta.1
      custom_version:
        description: 'Custom version (e.g. 1.0.0) — overrides bump if set'
        required: false
        default: ''

# Serialize releases so two rapid merges never race on the version bump.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    # On PR events: only run when the PR was actually merged, not just closed.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache node_modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      # ------------------------------------------------------------------
      # Determine bump type
      # ------------------------------------------------------------------
      - name: Determine bump type
        id: bump-type
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.custom_version }}" ]; then
              echo "type=${{ inputs.custom_version }}" >> "$GITHUB_OUTPUT"
            else
              echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
            fi
          else
            if echo "$PR_BODY" | grep -qiE '^\s*\[major\]\s*$'; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$PR_BODY" | grep -qiE '^\s*\[minor\]\s*$'; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=fix" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ------------------------------------------------------------------
      # Version bump
      # ------------------------------------------------------------------
      - name: Bump version
        id: version
        run: node .github/scripts/bump-version.cjs "${{ steps.bump-type.outputs.type }}"

      # ------------------------------------------------------------------
      # Build signed release APK & AAB
      # ------------------------------------------------------------------
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing_vars=()
          for var in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              missing_vars+=("$var")
            fi
          done

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "::error::Missing required release secrets: ${missing_vars[*]}"
            exit 1
          fi

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          echo "KEYSTORE_PATH=$(pwd)/android/app/release.keystore" >> "$GITHUB_ENV"

      - name: Convert keystore to JKS (BouncyCastle compatibility)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keytool -importkeystore \
            -srckeystore android/app/release.keystore \
            -destkeystore /tmp/release.jks \
            -deststoretype JKS \
            -srcstorepass:env KEYSTORE_PASSWORD \
            -deststorepass:env KEYSTORE_PASSWORD \
            -srcalias "$KEY_ALIAS" \
            -destalias "$KEY_ALIAS" \
            -srckeypass:env KEY_PASSWORD \
            -destkeypass:env KEY_PASSWORD \
            -noprompt
          mv /tmp/release.jks android/app/release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK & AAB
        run: cd android && ./gradlew assembleRelease bundleRelease --no-daemon -PreactNativeArchitectures=armeabi-v7a,arm64-v8a
        env:
          KEYSTORE_PATH:     ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Remove keystore from workspace
        if: always()
        run: rm -f android/app/release.keystore

      # ------------------------------------------------------------------
      # Commit, tag, push
      # ------------------------------------------------------------------
      - name: Commit & tag
        id: tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json app.json android/app/build.gradle \
                  fdroid/metadata/io.github.gametrojaner.geburtstage.yml
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push
          git push --tags
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # GitHub Release
      # ------------------------------------------------------------------
      - name: Rename APK & AAB
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          cp android/app/build/outputs/apk/release/app-release.apk \
             "Geburtstage-${VERSION}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab \
             "Geburtstage-${VERSION}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            Geburtstage-${{ steps.tag.outputs.version }}.apk
            Geburtstage-${{ steps.tag.outputs.version }}.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
