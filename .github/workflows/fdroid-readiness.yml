name: F-Droid Readiness

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - 'android/**'
      - 'app.config.js'
      - 'app.json'
      - 'package.json'
      - 'package-lock.json'
      - 'patches/**'
      - 'scripts/fdroid-check.cjs'
      - 'src/services/notifications.ts'
      - 'fdroid/**'
      - '.github/workflows/fdroid-readiness.yml'
  workflow_dispatch:

concurrency:
  group: fdroid-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: F-Droid profile checks
        run: npm run fdroid:check

      - name: Third-party licenses up-to-date
        run: npm run licenses:check

      - name: Detect heavy Android-impact changes
        id: heavy-changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'android/**'
              - 'app.config.js'
              - 'app.json'
              - 'package.json'
              - 'package-lock.json'
              - 'patches/**'
              - 'src/services/notifications.ts'

      - name: Typecheck
        if: github.event_name != 'pull_request'
        run: npm run test:typecheck

      - name: Unit tests
        if: github.event_name != 'pull_request'
        run: npm test -- --runInBand

      - name: Generate Android project (CI)
        if: github.event_name != 'pull_request' || steps.heavy-changes.outputs.android == 'true'
        run: npx expo prebuild --platform android --non-interactive

      - name: Android compile smoke test
        if: github.event_name != 'pull_request' || steps.heavy-changes.outputs.android == 'true'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
