    versionCode: 1
    commit: v1.0.0-beta.2
    sudo:
      - apt-get update
      - apt-get install -y npm openjdk-21-jdk
    init:
      - npm ci --legacy-peer-deps
    build:
      - npm run fdroid:check
      - cd android && ./gradlew assembleRelease -Pfdroid.build=true

