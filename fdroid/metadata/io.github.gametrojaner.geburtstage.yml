  # NOTE: From this entry onwards, use the fdroiddata submission format:
  # subdir: android, gradle: yes, prebuild: (not init:), scanignore: node_modules.
  # The prebuild field runs commands from the repo root before gradle, so npm ci works correctly.
  # The scanignore prevents F-Droid's proprietary-code scanner from traversing node_modules.
  - versionName: 1.0.0-beta.16
    versionCode: 1000016
    commit: v1.0.0-beta.16
    subdir: android
    sudo:
      - apt-get update
      - apt-get install -y npm openjdk-21-jdk
    gradle:
      - yes
    prebuild:
      - npm ci --legacy-peer-deps
      - npm run fdroid:check
    scanignore:
      - node_modules
    build: ./gradlew assembleRelease -Pfdroid.build=true

