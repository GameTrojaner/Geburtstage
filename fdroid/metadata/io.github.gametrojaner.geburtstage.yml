AutoName: Geburtstage
Summary: Local birthday reminders from contacts
Description: |
  Geburtstage is a privacy-focused birthday reminder app.

  Features:
  * Reads birthdays from local contacts.
  * Lets users edit birthdays directly in contacts.
  * Uses local scheduled reminders (no server required).
  * Supports widgets and offline data export/import.

RepoType: git
Repo: https://github.com/GameTrojaner/Geburtstage.git

Builds:
  - versionName: 1.0.0-beta.2
    versionCode: 1
    commit: chore(release)%3A 1.0.0-beta.2
    subdir: .
    sudo:
      - apt-get update
      - apt-get install -y npm openjdk-17-jdk
    init:
      - npm ci --legacy-peer-deps
    build:
      - npm run fdroid:check
      - cd android && ./gradlew assembleRelease

  - versionName: 1.0.0-beta.3
    versionCode: 2
    commit: HEAD
    subdir: .
